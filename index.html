<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VUNY OFFICIAL PREMIUM</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

<style>
:root{
--gold:#FFD700;
--gold2:#FFA500;
--bg:#050508;
--bg2:#0a0a12;
--bg3:#0f0f1a;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:var(--bg);
color:#e0e0e0;
font-family:'Rajdhani',sans-serif;
overflow-x:hidden;
}

/* PARTICLES */
canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

.wrapper{
position:relative;
z-index:2;
max-width:500px;
margin:auto;
padding:20px;
}

/* HEADER */
.header{
text-align:center;
padding:30px 0;
}

.store-name{
font-family:'Orbitron';
font-size:32px;
font-weight:900;
background:linear-gradient(90deg,#fff,var(--gold),var(--gold2),#fff);
background-size:300% auto;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:shine 6s linear infinite;
}

@keyframes shine{
0%{background-position:0% center;}
100%{background-position:300% center;}
}

/* PRODUCT */
.product-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:18px;
margin-bottom:30px;
}

.product-item{
background:rgba(255,215,0,0.05);
border:1px solid rgba(255,215,0,0.2);
border-radius:14px;
padding:15px;
text-align:center;
cursor:pointer;
transition:0.3s;
}

.product-item:hover{
transform:translateY(-6px) scale(1.05);
box-shadow:0 10px 35px rgba(255,215,0,0.4);
}

.product-img{
width:120px;
height:120px;
object-fit:cover;
border-radius:50%;
border:3px solid var(--gold);
box-shadow:0 0 20px rgba(255,215,0,0.6);
}

.product-name{
margin-top:10px;
font-weight:700;
font-size:14px;
color:var(--gold);
}

/* MODAL */
.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:10;
}

.overlay.active{display:flex;}

.modal{
background:#0b0b14;
width:90%;
max-width:420px;
border-radius:15px;
padding:20px;
}

.modal-title{
text-align:center;
font-family:'Orbitron';
color:var(--gold);
margin-bottom:15px;
}

.day-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;
margin-bottom:15px;
}

.day-btn{
background:var(--bg3);
border:1px solid rgba(255,215,0,0.3);
border-radius:8px;
padding:10px;
cursor:pointer;
color:white;
}

.day-btn.selected{
background:rgba(255,215,0,0.2);
border-color:var(--gold);
}

.input-field{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid rgba(255,215,0,0.3);
background:#111;
color:white;
margin-bottom:10px;
}

.btn-primary{
width:100%;
background:linear-gradient(135deg,var(--gold),var(--gold2));
border:none;
padding:12px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.qr-img{
width:200px;
margin:15px auto;
display:block;
}

.done-box{text-align:center;}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="wrapper">

<div class="header">
<div class="store-name">OWNER VUNY OFFICIAL</div>
</div>

<div class="product-grid" id="productGrid"></div>

</div>

<!-- MODAL -->
<div class="overlay" id="overlay">
<div class="modal">

<div id="step1">
<div class="modal-title" id="productTitle">BELI PRODUK</div>

<div class="day-grid">
<button class="day-btn" data-days="1" data-price="10000">1H - 10K</button>
<button class="day-btn" data-days="3" data-price="30000">3H - 30K</button>
<button class="day-btn" data-days="7" data-price="70000">7H - 70K</button>
<button class="day-btn" data-days="30" data-price="100000">30H - 100K</button>
</div>

<input type="text" id="username" class="input-field" placeholder="Masukkan Username">

<button class="btn-primary" onclick="goToPay()">LANJUT BAYAR</button>
<button class="btn-primary" onclick="closeModal()">BATAL</button>
</div>

<div id="step2" style="display:none;">
<div class="modal-title">SCAN QRIS</div>
<img src="qris.jpg" class="qr-img"
onerror="this.src='https://via.placeholder.com/200x200?text=QRIS+ERROR'">
<button class="btn-primary" onclick="showDone()">SUDAH BAYAR</button>
</div>

<div id="step3" style="display:none;">
<div class="done-box">
<div class="modal-title">TERIMA KASIH</div>
<p id="summary"></p>
<a id="telegramBtn" target="_blank" class="btn-primary">KONFIRMASI TELEGRAM</a>
<button class="btn-primary" onclick="closeModal()">KEMBALI</button>
</div>
</div>

</div>
</div>

<script>

/* PARTICLE */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<70;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2+1,
speed:Math.random()*0.6+0.2
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
particles.forEach(p=>{
p.y-=p.speed;
if(p.y<0)p.y=canvas.height;
ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fillStyle="rgba(255,215,0,0.7)";
ctx.shadowBlur=12;
ctx.shadowColor="#FFD700";
ctx.fill();
});
requestAnimationFrame(animate);
}
animate();

/* PRODUK LENGKAP 16 */
const products=[
{nama:"BR MODS",img:"br-mods.jpg"},
{nama:"BEYOND CHEAT",img:"beyond.jpg"},
{nama:"EVO CHEAT",img:"evo.jpg"},
{nama:"DRAGON PANEL STREAM",img:"dragon.jpg"},
{nama:"XFFHX",img:"xffhx.jpg"},
{nama:"STRICK BR",img:"strick.jpg"},
{nama:"ELEVEN",img:"elven.jpg"},
{nama:"SPOTIFY",img:"spotify.jpg"},
{nama:"LK TEAM",img:"lkteam.jpg"},
{nama:"EAGLE CHEAT",img:"eagle.jpg"},
{nama:"HAX-CRACK PRO",img:"hax.jpg"},
{nama:"MATRIX CHEAT",img:"matrix.jpg"},
{nama:"ARABEMODZ",img:"arab.jpg"},
{nama:"IMMORTAL CHEAT",img:"immortal.jpg"},
{nama:"SX2 TEAM V2",img:"sx2.jpg"},
{nama:"DEATH PANEL",img:"death.jpg"}
];

let selectedProduct="";
let selectedDays="";
let selectedPrice=0;

document.addEventListener("DOMContentLoaded",function(){

const grid=document.getElementById("productGrid");

products.forEach(prod=>{
const item=document.createElement("div");
item.className="product-item";
item.innerHTML=`
<img src="${prod.img}" class="product-img"
onerror="this.src='https://via.placeholder.com/120x120?text=IMG+ERROR'">
<div class="product-name">${prod.nama}</div>
`;
item.onclick=()=>openModal(prod.nama);
grid.appendChild(item);
});

document.querySelectorAll(".day-btn").forEach(btn=>{
btn.addEventListener("click",function(){
document.querySelectorAll(".day-btn").forEach(b=>b.classList.remove("selected"));
this.classList.add("selected");
selectedDays=this.dataset.days;
selectedPrice=this.dataset.price;
});
});

});

function openModal(name){
selectedProduct=name;
document.getElementById("productTitle").innerText="BELI - "+name;
document.getElementById("overlay").classList.add("active");
}

function closeModal(){
document.getElementById("overlay").classList.remove("active");
document.getElementById("step1").style.display="block";
document.getElementById("step2").style.display="none";
document.getElementById("step3").style.display="none";
}

function goToPay(){
const user=document.getElementById("username").value.trim();
if(!selectedDays||!user){
alert("Pilih durasi & isi username dulu!");
return;
}
document.getElementById("step1").style.display="none";
document.getElementById("step2").style.display="block";
}

function showDone(){
const user=document.getElementById("username").value.trim();
document.getElementById("step2").style.display="none";
document.getElementById("step3").style.display="block";

const text=`Halo admin, saya sudah bayar:
Produk: ${selectedProduct}
Durasi: ${selectedDays} Hari
Username: ${user}
Total: Rp ${Number(selectedPrice).toLocaleString("id-ID")}`;

document.getElementById("summary").innerHTML=text.replace(/\n/g,"<br>");
document.getElementById("telegramBtn").href=
"https://t.me/ADMVUNYREAL?text="+encodeURIComponent(text);
}

</script>

</body>
</html>
