<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VUNY OFFICIAL VIP</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    background:#000;
    color:white;
    overflow-x:hidden;
}

/* PARTICLE */
#particles{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
}

/* HEADER */
.header{
    text-align:center;
    padding:20px 10px 5px 10px;
    font-size:clamp(20px,5vw,26px);
    font-weight:bold;
    color:#ff0000;
    text-shadow:0 0 10px red,0 0 20px red,0 0 40px red;
    animation:glow 2s infinite alternate;
}

.sub-header{
    text-align:center;
    font-size:13px;
    letter-spacing:3px;
    color:#ff3333;
    margin-bottom:15px;
    text-shadow:0 0 10px red;
}

@keyframes glow{
    from{ text-shadow:0 0 10px red;}
    to{ text-shadow:0 0 25px red,0 0 50px red;}
}

/* VIDEO PROMO */
.video-promo{
    width:85%;
    max-width:340px;
    margin:35px auto 25px auto;
    border:1px solid red;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 0 15px red;
}

.video-promo video{
    width:100%;
    height:200px;
    object-fit:cover;
    display:block;
    pointer-events:none;
}

/* PRODUCTS (FIX SIZE KECIL) */
.products{
    display:grid;
    grid-template-columns:repeat(2, 1fr); /* selalu 2 kolom */
    gap:12px;
    padding:15px;
    max-width:420px; /* biar tidak melebar */
    margin:auto;
}

.card{
    background:#0f0f0f;
    border-radius:10px;
    padding:6px;
    text-align:center;
    border:1px solid red;
    box-shadow:0 0 10px red;
    transition:0.3s;
    height:200px; /* tinggi tetap */
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.card:hover{
    transform:translateY(-4px);
    box-shadow:0 0 20px red;
}

.card img{
    width:100%;
    height:90px;
    object-fit:cover;
    border-radius:6px;
}

.card h4{
    font-size:12px;
    margin:6px 0;
    word-break:break-word;
}

.buy-btn{
    width:100%;
    padding:6px;
    border:none;
    border-radius:6px;
    background:red;
    color:white;
    font-weight:bold;
    cursor:pointer;
    font-size:12px;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
    padding:15px;
    z-index:999;
}

.modal-content{
    background:#111;
    padding:20px;
    border-radius:15px;
    width:100%;
    max-width:360px;
    max-height:90vh;
    overflow-y:auto;
    border:1px solid red;
    box-shadow:0 0 25px red;
}

input,select{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:6px;
    border:1px solid red;
    background:#000;
    color:white;
    font-size:14px;
}

.qris{
    display:none;
    text-align:center;
    margin-top:10px;
}

.qris img{
    width:100%;
    max-width:180px;
    border-radius:10px;
}

.notice{
    margin-top:10px;
    font-size:13px;
    color:#ff4444;
    font-weight:bold;
}

.telegram-btn{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    background:#0088cc;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.close{
    text-align:right;
    cursor:pointer;
    font-size:18px;
}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="header">VUNY OFFICIAL VIP</div>
<div class="sub-header">READY CHEAT CRACK</div>

<div class="video-promo">
    <video autoplay muted loop playsinline>
        <source src="promo.mp4" type="video/mp4">
    </video>
</div>

<div class="products" id="productList"></div>

<div class="modal" id="orderModal">
    <div class="modal-content">
        <div class="close" onclick="closeModal()">✖</div>
        <h3 id="productTitle"></h3>

        <input type="text" id="username" placeholder="Buat Username">

        <select id="days">
            <option value="">Pilih Paket Hari</option>
            <option>1 Day - 10K</option>
            <option>3 Day - 30K</option>
            <option>5 Day - 40K</option>
            <option>7 Day - 50K</option>
            <option>10 Day - 60K</option>
            <option>15 Day - 70K</option>
            <option>30 Day - 100K</option>
            <option>365 Day - 300K</option>
        </select>

        <button class="buy-btn" onclick="showQR()">Bayar via QRIS</button>

        <div class="qris" id="qrisSection">
            <h4>Scan QRIS</h4>
            <img src="qris.jpg">
            <div class="notice">
                HABIS TRANSFER, SCREENSHOT LALU KIRIM BUKTI PEMBAYARAN KE ADMIN AGAR DI PROSES KEY
            </div>
            <button class="telegram-btn" onclick="kirimAdmin()">
                <i class="fab fa-telegram"></i> Kirim ke @ADMVUNYREAL
            </button>
        </div>
    </div>
</div>

<script>
const products=[
{nama:"BR MODS",img:"br-mods.jpg"},
{nama:"BEYOND CHEAT",img:"beyond.jpg"},
{nama:"EVO CHEAT",img:"evo.jpg"},
{nama:"DRAGON PANEL STREAM",img:"dragon.jpg"},
{nama:"XFFHX",img:"xffhx.jpg"},
{nama:"STRICK BR",img:"strick.jpg"},
{nama:"ELVEN",img:"elven.jpg"},
{nama:"SPOTIFY",img:"spotify.jpg"},
{nama:"LK TEAM",img:"lkteam.jpg"},
{nama:"EAGLE CHEAT",img:"eagle.jpg"},
{nama:"HAX-CRACK PRO",img:"hax.jpg"},
{nama:"MATRIX CHEAT",img:"matrix.jpg"},
{nama:"IMMO BLODY PRO",img:"immoblody.jpg"},
{nama:"IMMORTAL CHEAT",img:"immortal.jpg"},
{nama:"PANEL 07 32BIT",img:"panel07.jpg"},
{nama:"READY RESELLER 👤",img:"reseller.jpg"}
];

const productList=document.getElementById("productList");
products.forEach(p=>{
productList.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h4>${p.nama}</h4>
<button class="buy-btn" onclick="openModal(\`${p.nama}\`)">BUY</button>
</div>`;
});

let selectedProduct="";

function openModal(name){
selectedProduct=name;
document.getElementById("productTitle").innerText=name;
document.getElementById("orderModal").style.display="flex";
document.getElementById("qrisSection").style.display="none";
document.getElementById("username").value="";
document.getElementById("days").value="";
if(name==="READY RESELLER 👤"){
document.getElementById("days").style.display="none";
}else{
document.getElementById("days").style.display="block";
}
}

function closeModal(){
document.getElementById("orderModal").style.display="none";
}

function showQR(){
let user=document.getElementById("username").value.trim();
if(user===""){alert("Isi Username!");return;}
if(selectedProduct!=="READY RESELLER 👤"){
if(document.getElementById("days").value===""){alert("Pilih Paket!");return;}
}
document.getElementById("qrisSection").style.display="block";
}

function kirimAdmin(){
let user=document.getElementById("username").value;
let paket="150K (RESELLER)";
if(selectedProduct!=="READY RESELLER 👤"){
paket=document.getElementById("days").value;
}
let pesan=`Halo Admin VUNY OFFICIAL VIP

Produk: ${selectedProduct}
Username: ${user}
Paket: ${paket}

Saya sudah transfer, berikut bukti pembayaran.`;

window.open("https://t.me/ADMVUNYREAL?text="+encodeURIComponent(pesan));
}
</script>

</body>
</html>
